<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yacht Rock Radio — Smooth Sailing</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='85'>⚓</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #0a1628;
            --navy-light: #142238;
            --teak: #8b6914;
            --teak-light: #c4a35a;
            --brass: #d4af37;
            --brass-dim: #8a7a3e;
            --cream: #f5f5dc;
            --ivory: #fffff0;
            --glass: rgba(255, 255, 240, 0.08);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--navy);
            color: var(--ivory);
            height: 100vh;
            overflow: hidden;
        }

        #ocean {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .controls {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: linear-gradient(180deg, rgba(10,22,40,0.95) 0%, rgba(10,22,40,0.75) 60%, rgba(10,22,40,0.3) 100%);
            padding: 2rem 2rem 2.5rem;
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.25);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 1.75rem;
        }

        .header h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--brass);
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
            margin-bottom: 0.25rem;
        }

        .header p {
            font-family: 'Playfair Display', Georgia, serif;
            font-style: italic;
            font-size: 1rem;
            color: var(--teak-light);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .station-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.75rem;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .station-btn {
            position: relative;
            padding: 1rem 0.75rem;
            border: 2px solid rgba(212, 175, 55, 0.35);
            background: linear-gradient(145deg, rgba(139, 105, 20, 0.15), rgba(10, 22, 40, 0.6));
            color: var(--cream);
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.35s ease;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.5px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 4px 15px rgba(0,0,0,0.3);
        }

        .station-btn::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.5);
            transition: all 0.35s ease;
        }

        .station-btn:hover {
            border-color: var(--brass);
            background: linear-gradient(145deg, rgba(212, 175, 55, 0.15), rgba(10, 22, 40, 0.5));
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.15), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .station-btn:hover::before {
            background: var(--brass);
            box-shadow: 0 0 8px var(--brass);
        }

        .station-btn.active {
            background: linear-gradient(145deg, rgba(212, 175, 55, 0.25), rgba(139, 105, 20, 0.2));
            color: var(--ivory);
            border-color: var(--brass);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3), inset 0 1px 0 rgba(255,255,255,0.15);
            font-weight: 600;
        }

        .station-btn.active::before {
            background: #00ff88;
            border-color: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .info {
            display: flex;
            align-items: center;
            gap: 2rem;
            padding: 1.25rem 1.5rem;
            background: linear-gradient(90deg, rgba(139, 105, 20, 0.12), rgba(10, 22, 40, 0.5), rgba(139, 105, 20, 0.12));
            border-radius: 16px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .controls-section {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .play-pause-btn {
            padding: 0.75rem 2rem;
            border: 2px solid var(--brass);
            background: linear-gradient(145deg, rgba(212, 175, 55, 0.15), rgba(139, 105, 20, 0.1));
            color: var(--ivory);
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            white-space: nowrap;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .play-pause-btn:hover {
            background: linear-gradient(145deg, rgba(212, 175, 55, 0.3), rgba(139, 105, 20, 0.2));
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.25);
        }

        .play-pause-btn:focus-visible {
            outline: 2px solid var(--brass);
            outline-offset: 3px;
        }

        .play-pause-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(0, 0, 0, 0.25);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .volume-slider {
            width: 110px;
            height: 4px;
            border-radius: 2px;
            background: rgba(212, 175, 55, 0.2);
            outline: none;
            -webkit-appearance: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--brass);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
            border: 2px solid var(--ivory);
        }

        .volume-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--brass);
            cursor: pointer;
            border: 2px solid var(--ivory);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
        }

        .volume-icon {
            font-size: 1.1rem;
            cursor: pointer;
            user-select: none;
            min-width: 26px;
            text-align: center;
            transition: transform 0.2s;
        }

        .volume-icon:hover {
            transform: scale(1.2);
        }

        .info-content {
            flex: 1;
        }

        .station-name {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--brass);
            margin-bottom: 0.35rem;
            letter-spacing: 0.5px;
        }

        .status {
            font-size: 0.75rem;
            color: var(--teak-light);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .status.playing {
            color: #7ee787;
            text-shadow: 0 0 10px rgba(126, 231, 135, 0.3);
        }

        .status.buffering {
            color: #ffd166;
        }

        .visualizer-bars {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100px;
            display: flex;
            align-items: flex-end;
            gap: 3px;
            padding: 1.5rem 2rem;
            background: linear-gradient(to top, rgba(10, 22, 40, 0.95), rgba(10, 22, 40, 0.5));
            justify-content: center;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
        }

        .bar {
            flex: 1;
            background: linear-gradient(to top, var(--brass), var(--teak-light));
            min-height: 3px;
            height: 4px;
            border-radius: 3px 3px 0 0;
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
            max-width: 14px;
            transition: height 0.06s linear;
            opacity: 0.85;
        }

        .bar:nth-child(odd) {
            background: linear-gradient(to top, #e8c872, var(--brass));
        }

        @media (max-width: 768px) {
            .controls {
                padding: 1.25rem 1rem 1.5rem;
            }

            .header h1 {
                font-size: 1.75rem;
            }

            .header p {
                font-size: 0.8rem;
            }

            .station-grid {
                grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
                gap: 0.6rem;
            }

            .station-btn {
                padding: 0.85rem 0.5rem 0.85rem;
                font-size: 0.7rem;
                border-radius: 40px;
            }

            .station-btn::before {
                display: none;
            }

            .info {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
                padding: 1rem;
            }

            .controls-section {
                flex-direction: row;
                width: 100%;
                justify-content: center;
            }

            .play-pause-btn {
                width: auto;
                min-width: 120px;
            }

            .volume-control {
                width: auto;
            }

            .volume-slider {
                width: 90px;
            }

            .visualizer-bars {
                height: 70px;
                padding: 1rem;
            }
        }
    </style>
</head>

<body>
    <canvas id="ocean"></canvas>

    <div class="controls">
        <div class="header">
            <h1>⚓ Yacht Rock Radio</h1>
            <p>Smooth Sailing Since 1976</p>
        </div>

        <div class="station-grid" id="stationGrid" role="radiogroup" aria-label="Radio stations"></div>

        <div class="info">
            <div class="info-content">
                <div class="station-name" id="stationName">Select a station</div>
                <div class="status" id="stationStatus">Ready to set sail</div>
            </div>
            <div class="controls-section">
                <button class="play-pause-btn" id="playPauseBtn" onclick="togglePlayPause()" disabled aria-label="Play or pause">▶ Play</button>
                <div class="volume-control">
                    <span class="volume-icon" id="volumeIcon" onclick="toggleMute()" role="button" tabindex="0" aria-label="Toggle mute">🔊</span>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70" oninput="updateVolume(this.value)" aria-label="Volume control">
                </div>
            </div>
        </div>
    </div>

    <div class="visualizer-bars" id="visualizerBars" aria-hidden="true"></div>

    <script>
        const stations = [
            { name: "181.fm Yacht Rock", url: "https://listen.181fm.com/181-yachtrock_128k.mp3" },
            { name: "SomaFM Left Coast 70s", url: "https://ice5.somafm.com/seventies-128-mp3" },
            { name: "181.fm Mellow Gold", url: "https://listen.181fm.com/181-mellow_128k.mp3" },
            { name: "Radio Paradise Mellow", url: "https://stream.radioparadise.com/mellow-192" },
            { name: "181.fm Super 70s", url: "https://listen.181fm.com/181-70s_128k.mp3" },
            { name: "181.fm Lite 80s", url: "https://listen.181fm.com/181-lite80s_128k.mp3" },
            { name: "SomaFM Illinois Lounge", url: "https://ice5.somafm.com/illstreet-128-mp3" },
            { name: "181.fm The Eagle", url: "https://listen.181fm.com/181-eagle_128k.mp3" },
            { name: "181.fm Awesome 80s", url: "https://listen.181fm.com/181-awesome80s_128k.mp3" },
            { name: "181.fm Jazz Mix", url: "https://listen.181fm.com/181-jazzmix_128k.mp3" },
            { name: "181.fm The Breeze", url: "https://listen.181fm.com/181-breeze_128k.mp3" },
            { name: "Radio Paradise Main", url: "https://stream.radioparadise.com/mp3-192" },
            { name: "181.fm Classic Hits", url: "https://listen.181fm.com/181-greatoldies_128k.mp3" },
            { name: "SomaFM Lush", url: "https://ice5.somafm.com/lush-128-mp3" },
            { name: "181.fm Soul", url: "https://listen.181fm.com/181-soul_128k.mp3" }
        ];

        let currentStation = null;
        let audio = new Audio();
        audio.volume = 0.7;
        let isPlaying = false;
        let previousVolume = 70;
        let isMuted = false;

        const stationGrid = document.getElementById('stationGrid');
        stations.forEach((station, idx) => {
            const btn = document.createElement('button');
            btn.className = 'station-btn';
            btn.textContent = station.name;
            btn.setAttribute('role', 'radio');
            btn.setAttribute('aria-checked', 'false');
            btn.onclick = () => playStation(idx, btn);
            stationGrid.appendChild(btn);
        });

        function playStation(idx, btn) {
            document.querySelectorAll('.station-btn').forEach(b => {
                b.classList.remove('active');
                b.setAttribute('aria-checked', 'false');
            });
            btn.classList.add('active');
            btn.setAttribute('aria-checked', 'true');

            currentStation = idx;
            const station = stations[idx];
            document.getElementById('stationName').textContent = station.name;
            const statusEl = document.getElementById('stationStatus');
            statusEl.textContent = 'Loading...';
            statusEl.className = 'status';

            const playPauseBtn = document.getElementById('playPauseBtn');
            playPauseBtn.disabled = false;

            audio.pause();
            audio.src = '';
            audio.load();

            audio.src = station.url;
            audio.load();
            
            audio.play().then(() => {
                isPlaying = true;
                playPauseBtn.textContent = '⏸ Pause';
            }).catch(e => {
                console.error('Playback error:', e);
                statusEl.textContent = 'Unable to load stream';
                statusEl.className = 'status';
                isPlaying = false;
                playPauseBtn.textContent = '▶ Play';
            });
        }

        function togglePlayPause() {
            if (!audio.src || currentStation === null) return;
            
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play().catch(e => {
                    console.error('Playback error:', e);
                    const statusEl = document.getElementById('stationStatus');
                    statusEl.textContent = 'Playback failed';
                    statusEl.className = 'status';
                });
            }
        }

        function updateVolume(value) {
            const numValue = parseInt(value);
            audio.volume = numValue / 100;
            
            if (numValue > 0 && isMuted) {
                isMuted = false;
                audio.muted = false;
            }
            
            updateVolumeIcon(numValue);
        }

        function updateVolumeIcon(value) {
            const icon = document.getElementById('volumeIcon');
            if (value == 0 || isMuted) {
                icon.textContent = '🔇';
            } else if (value < 50) {
                icon.textContent = '🔉';
            } else {
                icon.textContent = '🔊';
            }
        }

        function toggleMute() {
            if (isMuted) {
                isMuted = false;
                audio.muted = false;
                const slider = document.getElementById('volumeSlider');
                if (parseInt(slider.value) === 0) {
                    slider.value = previousVolume || 70;
                    audio.volume = (previousVolume || 70) / 100;
                }
                updateVolumeIcon(parseInt(slider.value));
            } else {
                isMuted = true;
                previousVolume = parseInt(document.getElementById('volumeSlider').value) || previousVolume;
                audio.muted = true;
                updateVolumeIcon(0);
            }
        }

        audio.onplay = () => {
            const statusEl = document.getElementById('stationStatus');
            statusEl.textContent = '♫ Now Playing';
            statusEl.className = 'status playing';
            isPlaying = true;
            document.getElementById('playPauseBtn').textContent = '⏸ Pause';
        };

        audio.onpause = () => {
            const statusEl = document.getElementById('stationStatus');
            statusEl.textContent = '⏸ Paused';
            statusEl.className = 'status';
            isPlaying = false;
            document.getElementById('playPauseBtn').textContent = '▶ Play';
        };

        audio.onwaiting = () => {
            const statusEl = document.getElementById('stationStatus');
            statusEl.textContent = '⏳ Buffering...';
            statusEl.className = 'status buffering';
        };

        audio.onplaying = () => {
            const statusEl = document.getElementById('stationStatus');
            if (isPlaying) {
                statusEl.textContent = '♫ Now Playing';
                statusEl.className = 'status playing';
            }
        };

        audio.onerror = () => {
            const statusEl = document.getElementById('stationStatus');
            statusEl.textContent = '⚠ Stream Error';
            statusEl.className = 'status';
            isPlaying = false;
            document.getElementById('playPauseBtn').textContent = '▶ Play';
            console.error('Audio error:', audio.error);
        };

        audio.onstalled = () => {
            const statusEl = document.getElementById('stationStatus');
            statusEl.textContent = '⏳ Connection Stalled';
            statusEl.className = 'status buffering';
        };

        function animateVisualizer() {
            const bars = document.querySelectorAll('.bar');
            let time = 0;
            
            function loop() {
                time += 0.1;
                
                bars.forEach((bar, i) => {
                    const baseFreq = Math.sin(time * 0.5 + i * 0.3) * 0.5 + 0.5;
                    const midFreq = Math.sin(time * 0.8 + i * 0.2) * 0.3 + 0.3;
                    const highFreq = Math.sin(time * 1.2 + i * 0.5) * 0.2 + 0.2;
                    
                    let intensity = (baseFreq + midFreq + highFreq) / 3;
                    intensity += (Math.random() - 0.5) * 0.1;
                    
                    if (isPlaying) {
                        intensity *= 1.5;
                    } else {
                        intensity *= 0.2;
                    }
                    
                    const height = Math.max(4, intensity * 80);
                    bar.style.height = `${height}px`;
                });
                
                requestAnimationFrame(loop);
            }
            loop();
        }

        const canvas = document.getElementById('ocean');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize, { passive: true });

        let wave = 0;
        function renderOcean() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#050d1a');
            gradient.addColorStop(0.35, '#0f1f35');
            gradient.addColorStop(0.6, '#1c3a5c');
            gradient.addColorStop(0.85, '#2d5a7a');
            gradient.addColorStop(1, '#d4a574');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            wave += 0.003;

            for (let i = 0; i < 8; i++) {
                ctx.strokeStyle = `rgba(212, 175, 55, ${0.25 - i * 0.03})`;
                ctx.lineWidth = 2;
                ctx.beginPath();

                for (let x = 0; x <= canvas.width; x += 10) {
                    const y =
                        canvas.height * 0.58 +
                        Math.sin(x * 0.005 + wave + i * 0.5) * 45 +
                        Math.sin(x * 0.003 + wave * 0.5) * 25 +
                        i * 20;

                    if (x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }

                ctx.lineTo(canvas.width, canvas.height);
                ctx.lineTo(0, canvas.height);
                ctx.closePath();
                ctx.fill();
            }

            requestAnimationFrame(renderOcean);
        }
        renderOcean();

        const visualizerContainer = document.getElementById('visualizerBars');
        for (let i = 0; i < 40; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            visualizerContainer.appendChild(bar);
        }
        
        animateVisualizer();

        document.getElementById('volumeIcon').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                toggleMute();
            }
        });
    </script>
</body>

</html>
