<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#04131f" />
  <meta name="description" content="Luxury yacht rock radio PWA with cinematic visuals and premium audio." />

  <title>Yacht Gold</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link rel="preconnect" href="https://ice1.somafm.com" crossorigin />
  <link rel="preconnect" href="https://stream.radioparadise.com" crossorigin />

  <style>
    :root {
      --bg: #04131f;
      --bg2: #08273d;
      --gold: #d8b24d;
      --gold-soft: #ffe7a6;
      --text: #f4f7fb;
      --muted: rgba(255, 255, 255, 0.6);
      --glass: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: var(--bg);
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      overflow: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(216,178,77,.1), transparent 40%),
        linear-gradient(135deg, var(--bg) 0%, var(--bg2) 55%, #0d3652 100%);
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .player-card {
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .station-info {
      min-height: 60px; /* Prevents layout jump when text changes */
    }

    .station-info h2 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--gold-soft);
      margin-bottom: 0.5rem;
      transition: opacity 0.3s ease;
    }

    .station-info p {
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      transition: opacity 0.3s ease;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }

    button {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text);
      display: grid;
      place-items: center;
      transition: all 0.2s ease;
    }

    button:hover {
      color: var(--gold);
    }

    button:active {
      transform: scale(0.95);
    }

    .skip-btn svg {
      width: 28px;
      height: 28px;
      fill: currentColor;
    }

    .play-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--gold);
      color: var(--bg);
      box-shadow: 0 8px 24px rgba(216, 178, 77, 0.3);
    }

    .play-btn:hover {
      background: var(--gold-soft);
      color: var(--bg);
      box-shadow: 0 12px 32px rgba(216, 178, 77, 0.4);
      transform: scale(1.05);
    }

    .play-btn svg {
      width: 32px;
      height: 32px;
      fill: currentColor;
      margin-left: 4px;
      transition: margin 0.2s;
    }

    .play-btn.playing svg {
      margin-left: 0;
    }

    .volume-container {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--muted);
    }

    .volume-container svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      flex-shrink: 0;
    }

    input[type=range] {
      flex: 1;
      -webkit-appearance: none;
      background: transparent;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
    }
